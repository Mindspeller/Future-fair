<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            '/?path=' + encodeURIComponent(l.pathname + l.search + l.hash)
        );
    </script>
</head>

<body>
    <p>Redirecting...</p>
</body>

</html>
